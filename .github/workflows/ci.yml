name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 runtime for actions to address the deprecation warning.
      # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'

    - name: Install deps
      run: pnpm install --frozen-lockfile

    - name: Lint code
      run: pnpm lint

    - name: TypeScript check
      run: pnpm typecheck

    # Note: No unit tests in this project yet (only Playwright E2E, which targets the live Vercel deployment and is run separately via ./run-tests.sh).
    # - name: Unit tests + coverage
    #   run: pnpm test:unit:coverage

    # E2E (Playwright) is intentionally kept out of this CI because it requires a live Vercel URL + bypass.
